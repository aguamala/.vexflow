---
name: VEX Triage

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  update:
    if: startsWith(github.event.comment.body, '/not_affected') || startsWith(github.event.comment.body, '/affected') || startsWith(github.event.comment.body, '/fixed') || startsWith(github.event.comment.body, '/under_investigation')
    runs-on: ubuntu-latest

    concurrency:
      group: vexflow-${{ github.repository }}
      cancel-in-progress: false

    permissions:
      id-token: write
      attestations: write
      contents: read
      issues: write

    steps:
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26"
          cache: false

      - name: Build vexflow from fix branch
        run: |
          git clone --depth=1 --branch fix-merge-statements-before-publish \
            https://github.com/deobieta/vexflow /tmp/vexflow-src
          cd /tmp/vexflow-src && go build -o /usr/local/bin/vexflow .

      - name: Process triage commands
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vexflow update \
            --repo aguamala/baseline-init \
            --branch main \
            --scan=false
